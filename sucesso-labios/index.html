<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compra Confirmada — Dra. Carol Mafra</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0a; --accent: #c8a96e; --text: #e8e0d4; }
  body { background: var(--bg); color: var(--text); font-family: Georgia, serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
  .logo { font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); opacity: 0.7; margin-bottom: 40px; }
  .check { font-size: 3rem; margin-bottom: 20px; }
  h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 400; line-height: 1.4; margin-bottom: 16px; }
  h1 em { color: var(--accent); font-style: italic; }
  .sub { font-family: sans-serif; font-size: 0.95rem; color: #aaa; line-height: 1.7; max-width: 480px; margin: 0 auto 40px; }
  .divider { width: 40px; height: 1px; background: var(--accent); opacity: 0.4; margin: 0 auto 36px; }
  .step-list { font-family: sans-serif; font-size: 0.88rem; color: #888; line-height: 2; margin-bottom: 48px; }
  .step-list span { color: var(--accent); margin-right: 8px; }
  .btn-whats { display: inline-flex; align-items: center; gap: 10px; background: #25D366; color: #fff; font-family: sans-serif; font-size: 0.95rem; font-weight: 600; padding: 16px 32px; border-radius: 4px; text-decoration: none; transition: opacity .2s; }
  .btn-whats:hover { opacity: 0.88; }
  .note { font-family: sans-serif; font-size: 0.72rem; color: #555; margin-top: 20px; }
  .footer-link { margin-top: 60px; font-family: sans-serif; font-size: 0.78rem; color: #444; }
  .footer-link a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<p class="logo">Dra. Carol Mafra · CRO-MG 66417</p>
<div class="check">✅</div>
<h1 id="t-title"></h1>
<p class="sub" id="t-sub"></p>
<div class="divider"></div>
<div class="step-list" id="t-steps"></div>
<a class="btn-whats" id="whatsBtn" href="#" target="_blank">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  <span id="t-btn"></span>
</a>
<p class="note" id="t-note"></p>
<div class="footer-link"><a href="/labios" id="t-back"></a></div>

<script>
const WHATS = '5533998514322';

const i18n = {
  pt: {
    title: 'Pagamento confirmado.<br><em>Sua análise está a caminho.</em>',
    sub: 'Em breve você receberá um e-mail com as instruções para enviar suas fotos e dar início à sua análise personalizada.',
    steps: ['Você receberá um e-mail de confirmação', 'Envie suas fotos conforme as instruções', 'A Dra. Carol analisa e entrega em até 3 dias úteis'],
    btn: 'Enviar fotos pelo WhatsApp',
    note: 'Ao clicar, você será direcionada ao WhatsApp da Dra. Carol com uma mensagem pré-preenchida.',
    back: '← Voltar para a página',
    waMsg: (plano) => `Olá, Dra. Carol! Acabei de adquirir o plano ${plano} e estou pronta para enviar minhas fotos. 🌸`,
    planos: { essencial: 'Essencial (R$97)', completo: 'Completo (R$247)', premium: 'Premium (R$347)' }
  },
  en: {
    title: 'Payment confirmed.<br><em>Your analysis is on its way.</em>',
    sub: 'You will soon receive an email with instructions on how to send your photos and start your personalized analysis.',
    steps: ['You will receive a confirmation email', 'Send your photos as instructed', 'Dr. Carol analyzes and delivers within 3 business days'],
    btn: 'Send photos via WhatsApp',
    note: 'By clicking, you will be directed to Dr. Carol\'s WhatsApp with a pre-filled message.',
    back: '← Back to the page',
    waMsg: (plano) => `Hello, Dr. Carol! I just purchased the ${plano} plan and I'm ready to send my photos. 🌸`,
    planos: { essencial: 'Essential ($47)', completo: 'Complete ($127)', premium: 'Premium ($177)' }
  },
  es: {
    title: 'Pago confirmado.<br><em>Tu análisis está en camino.</em>',
    sub: 'Pronto recibirás un correo electrónico con las instrucciones para enviar tus fotos e iniciar tu análisis personalizado.',
    steps: ['Recibirás un correo de confirmación', 'Envía tus fotos según las instrucciones', 'La Dra. Carol analiza y entrega en hasta 3 días hábiles'],
    btn: 'Enviar fotos por WhatsApp',
    note: 'Al hacer clic, serás dirigida al WhatsApp de la Dra. Carol con un mensaje prellenado.',
    back: '← Volver a la página',
    waMsg: (plano) => `¡Hola, Dra. Carol! Acabo de adquirir el plan ${plano} y estoy lista para enviar mis fotos. 🌸`,
    planos: { essencial: 'Esencial (€44)', completo: 'Completo (€117)', premium: 'Premium (€163)' }
  },
  fr: {
    title: 'Paiement confirmé.<br><em>Votre analyse est en route.</em>',
    sub: 'Vous recevrez bientôt un e-mail avec les instructions pour envoyer vos photos et commencer votre analyse personnalisée.',
    steps: ['Vous recevrez un e-mail de confirmation', 'Envoyez vos photos selon les instructions', 'La Dr. Carol analyse et livre en 3 jours ouvrés'],
    btn: 'Envoyer les photos par WhatsApp',
    note: 'En cliquant, vous serez dirigée vers le WhatsApp de la Dr. Carol avec un message pré-rempli.',
    back: '← Retour à la page',
    waMsg: (plano) => `Bonjour, Dr. Carol ! Je viens d'acquérir le plan ${plano} et je suis prête à envoyer mes photos. 🌸`,
    planos: { essencial: 'Essentiel (€44)', completo: 'Complet (€117)', premium: 'Premium (€163)' }
  },
  it: {
    title: 'Pagamento confermato.<br><em>La tua analisi è in arrivo.</em>',
    sub: 'Riceverai presto un\'e-mail con le istruzioni per inviare le tue foto e iniziare la tua analisi personalizzata.',
    steps: ['Riceverai un\'e-mail di conferma', 'Invia le tue foto seguendo le istruzioni', 'La Dr.ssa Carol analizza e consegna entro 3 giorni lavorativi'],
    btn: 'Invia foto tramite WhatsApp',
    note: 'Cliccando, sarai indirizzata al WhatsApp della Dr.ssa Carol con un messaggio pre-compilato.',
    back: '← Torna alla pagina',
    waMsg: (plano) => `Ciao, Dr.ssa Carol! Ho appena acquistato il piano ${plano} e sono pronta a inviare le mie foto. 🌸`,
    planos: { essencial: 'Essenziale (€44)', completo: 'Completo (€117)', premium: 'Premium (€163)' }
  }
};

function detectLang() {
  const p = new URLSearchParams(window.location.search).get('lang');
  if (p && i18n[p]) return p;
  const nav = (navigator.language || 'pt').toLowerCase();
  if (nav.startsWith('pt')) return 'pt';
  if (nav.startsWith('es')) return 'es';
  if (nav.startsWith('fr')) return 'fr';
  if (nav.startsWith('it')) return 'it';
  if (nav.startsWith('en')) return 'en';
  return 'pt';
}

const lang = detectLang();
const t = i18n[lang];
const params = new URLSearchParams(window.location.search);
const planoKey = params.get('plano') || 'essencial';
const planoNome = t.planos[planoKey] || planoKey;

document.getElementById('t-title').innerHTML = t.title;
document.getElementById('t-sub').textContent = t.sub;
document.getElementById('t-steps').innerHTML = t.steps.map((s, i) => `<div><span>${['①','②','③'][i]}</span> ${s}</div>`).join('');
document.getElementById('t-btn').textContent = t.btn;
document.getElementById('t-note').textContent = t.note;
document.getElementById('t-back').textContent = t.back;

const msg = encodeURIComponent(t.waMsg(planoNome));
document.getElementById('whatsBtn').href = `https://wa.me/${WHATS}?text=${msg}`;
</script>
</body>
</html>
